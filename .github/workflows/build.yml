name: Build Kahilapan apk

on:
  push:
    branches: [ debug ]
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup
      run: |
         chmod +x gradlew
         
    - name: Build APK
      run: |
         if [ "${{ github.event.inputs.buildType }}" == "debug" ]; then
           ./gradlew assembleDebug
         else
           chmod +x generate_keystore.sh
           ./gradlew clean
           ./generate_keystore.sh
           ./gradlew assembleRelease
         fi
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Kahilapan-files
        path: app/build/outputs/apk/${{ github.event.inputs.buildType }}/*.apk
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.buildType }}
        body: |
            ## 📱 Android Build
            
            ### Installation:
            1. Download APK
            2. Enable "Unknown Sources" in settings
            3. Install APK
        files: app/build/outputs/apk/${{ github.event.inputs.buildType }}/*.apk
        draft: false
        prerelease: true